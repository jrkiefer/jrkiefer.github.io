<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dough Tracker — Dough Bible 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Mono', monospace;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 14px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 420px;
      margin: 0 auto;
      padding: 0 12px 120px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, rgba(183,28,28,0.9) 0%, rgba(211,47,47,0.9) 50%, rgba(229,57,53,0.9) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.25rem 1rem;
      text-align: center;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 2px;
    }
    .header .subtitle {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Cards ── */
    .card {
      background: rgba(39, 53, 72, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    /* ── Inputs ── */
    .input-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .input-group { margin-bottom: 10px; }
    .input-group:last-child { margin-bottom: 0; }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      color: #cbd5e1;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .input-group .per-tray {
      font-size: 0.6rem;
      color: #64748b;
      font-weight: 400;
    }

    /* ── Dollar input with external $ ── */
    .dollar-field {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dollar-field .dollar-sign {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
      flex-shrink: 0;
    }
    .dollar-field input {
      flex: 1;
      min-width: 0;
    }
    .dollar-hint {
      font-size: 0.6rem;
      color: #64748b;
      margin-top: 3px;
      height: 14px;
    }
    .dollar-hint span {
      color: #94a3b8;
    }

    input[type="text"] {
      width: 100%;
      height: 48px;
      padding: 0 12px;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
      background: #1a2535;
      border: 1px solid #334155;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]::placeholder {
      color: #475569;
      font-weight: 400;
    }
    input[type="text"]:focus {
      border-color: #d32f2f;
      box-shadow: 0 0 0 3px rgba(211,47,47,0.2);
    }

    /* ── Tray Counter ── */
    .tc-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .tc-group label {
      font-size: 0.55rem;
      color: #94a3b8;
      margin-bottom: 2px;
    }
    .tc-group input {
      height: 38px;
      font-size: 0.85rem;
    }
    .tc-total {
      font-size: 0.6rem;
      color: #94a3b8;
      margin-top: 4px;
      text-align: right;
    }
    .tc-total span {
      color: #e2e8f0;
      font-weight: 700;
    }

    /* ── Sales Left Banner ── */
    .sales-left {
      background: rgba(33,150,243,0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(33,150,243,0.25);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      margin-top: 12px;
    }
    .sales-left .sl-label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #64B5F6;
      margin-bottom: 2px;
    }
    .sales-left .sl-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #90CAF9;
    }

    /* ── Results Grid ── */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .size-card {
      background: rgba(39, 53, 72, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    .size-card .accent-bar {
      height: 3px;
    }
    .size-card .sc-body {
      padding: 12px;
    }
    .size-card .sc-name {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .size-card .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      margin-bottom: 10px;
    }
    .size-card .stat {
      text-align: center;
    }
    .size-card .stat .stat-label {
      font-size: 0.55rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .size-card .stat .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .stat-value.positive { color: #4ade80; }
    .stat-value.negative { color: #ef4444; }

    .size-card .make-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid #334155;
    }
    .size-card .make-label {
      font-size: 0.65rem;
      color: #94a3b8;
    }
    .size-card .make-label strong {
      color: #e2e8f0;
      font-size: 0.85rem;
    }
    .size-card .tray-badge {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    /* ── Boil Dough Card ── */
    .boil-card {
      background: rgba(39, 53, 72, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .boil-card .accent-bar { height: 4px; background: #f59e0b; }
    .boil-card .sc-body { padding: 14px; }
    .boil-card .sc-name {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #f59e0b;
      margin-bottom: 10px;
    }
    .boil-card .boil-stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 10px;
    }
    .boil-card .boil-stat { text-align: center; }
    .boil-card .boil-stat .stat-label {
      font-size: 0.55rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .boil-card .boil-stat .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .boil-card .boil-make {
      text-align: center;
      padding-top: 10px;
      border-top: 1px solid #334155;
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .boil-card .boil-make.stocked { color: #4ade80; }
    .boil-input-full {
      grid-column: 1 / -1;
    }

    /* ── Batch Hero ── */
    .batch-card {
      border-radius: 16px;
      padding: 24px 16px 20px;
      text-align: center;
      overflow: hidden;
    }
    .batch-card.has-batches {
      background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 50%, #e53935 100%);
    }
    .batch-card.zero-batches {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #43a047 100%);
    }
    .batch-card .batch-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 4px;
    }
    .batch-card .batch-number {
      font-size: 80px;
      font-weight: 700;
      line-height: 1;
      color: #fff;
      margin-bottom: 4px;
    }
    .batch-card .batch-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 16px;
    }
    .batch-card .tray-breakdown {
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .batch-card .tb-item {
      text-align: center;
    }
    .batch-card .tb-item .tb-count {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }
    .batch-card .tb-item .tb-label {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Save Button ── */
    .save-btn {
      display: block;
      width: 100%;
      height: 52px;
      margin-top: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      background: #10b981;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      -webkit-appearance: none;
    }
    .save-btn:active { background: #059669; }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .save-btn.error { background: #ef4444; }
    .save-btn.success { background: #059669; }

    /* ── History ── */
    .history-section { margin-top: 16px; }
    .history-card {
      background: rgba(39, 53, 72, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-card .hc-date {
      font-size: 0.7rem;
      font-weight: 700;
      color: #cbd5e1;
    }
    .history-card .hc-details {
      font-size: 0.6rem;
      color: #94a3b8;
      margin-top: 2px;
    }
    .history-card .hc-batches {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .history-link {
      display: block;
      text-align: center;
      margin-top: 8px;
      font-size: 0.7rem;
      color: #64B5F6;
      text-decoration: underline;
      text-decoration-style: dotted;
    }

    /* ── Reset Link ── */
    .header { position: relative; }
    .reset-btn {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      background: none;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .reset-btn:active { color: #fff; }

    /* ── Temperature Section ── */
    .temp-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 2px solid rgba(245, 158, 11, 0.3);
    }
    .temp-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f59e0b;
      margin-bottom: 12px;
    }
    .temp-date-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: flex-end;
    }
    .temp-date-row .input-group { flex: 1; margin-bottom: 0; }
    .temp-date-row input[type="text"] {
      border-color: rgba(245, 158, 11, 0.3);
    }
    .temp-date-row input[type="text"]:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    .temp-load-btn {
      height: 48px;
      padding: 0 16px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: #1e293b;
      background: #f59e0b;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-appearance: none;
    }
    .temp-load-btn:active { background: #d97706; }
    .temp-load-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .temp-message {
      font-size: 0.7rem;
      color: #94a3b8;
      text-align: center;
      padding: 12px;
      margin-bottom: 12px;
    }
    .temp-message.error { color: #fbbf24; }
    .temp-override {
      display: block;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: #f59e0b;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      margin-bottom: 12px;
    }
    .temp-override:active { color: #fbbf24; }
    .temp-manual-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .temp-manual-row .input-group { flex: 1; margin-bottom: 0; }
    .temp-manual-row input[type="text"] {
      border-color: rgba(245, 158, 11, 0.3);
    }
    .temp-manual-row input[type="text"]:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    .temp-batch-pair {
      background: rgba(39, 53, 72, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(245, 158, 11, 0.15);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .temp-batch-pair .tb-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #f59e0b;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .temp-batch-pair .tb-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .temp-batch-pair .tb-inputs label {
      display: block;
      font-size: 0.55rem;
      color: #94a3b8;
      margin-bottom: 2px;
    }
    .temp-batch-pair .tb-inputs input[type="text"] {
      height: 44px;
      font-size: 0.95rem;
      border-color: rgba(245, 158, 11, 0.3);
    }
    .temp-batch-pair .tb-inputs input[type="text"]:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    .temp-save-btn {
      display: block;
      width: 100%;
      height: 52px;
      margin-top: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: #1e293b;
      background: #f59e0b;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      -webkit-appearance: none;
    }
    .temp-save-btn:active { background: #d97706; }
    .temp-save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .temp-save-btn.error { background: #ef4444; color: #fff; }
    .temp-save-btn.success { background: #d97706; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dough Tracker</h1>
    <div class="subtitle">Dough Bible 2026</div>
    <button type="button" class="reset-btn" id="resetBtn">Reset</button>
  </div>

  <main>
    <!-- Sales & Forecast -->
    <div class="card">
      <div class="card-label">Sales &amp; Forecast</div>
      <div class="input-grid-2">
        <div class="input-group">
          <label for="currentSales">Current Sales</label>
          <div class="dollar-field">
            <span class="dollar-sign">$</span>
            <input type="text" id="currentSales" inputmode="decimal" placeholder="1.7">
          </div>
          <div class="dollar-hint" id="hintCurrentSales"></div>
        </div>
        <div class="input-group">
          <label for="todayForecast">Today's Forecast</label>
          <div class="dollar-field">
            <span class="dollar-sign">$</span>
            <input type="text" id="todayForecast" inputmode="decimal" placeholder="10">
          </div>
          <div class="dollar-hint" id="hintTodayForecast"></div>
        </div>
      </div>
      <div class="input-group">
        <label for="tomorrowForecast">Tomorrow's Forecast</label>
        <div class="dollar-field">
          <span class="dollar-sign">$</span>
          <input type="text" id="tomorrowForecast" inputmode="decimal" placeholder="10">
        </div>
        <div class="dollar-hint" id="hintTomorrowForecast"></div>
      </div>
      <div class="sales-left" id="salesLeftBanner">
        <div class="sl-label">Sales Left</div>
        <div class="sl-value" id="salesLeftValue">$0</div>
      </div>
    </div>

    <!-- Dough Counts -->
    <div class="card">
      <div class="card-label">Current Dough Counts</div>
      <div class="input-grid-2">
        <div class="input-group">
          <label>Individual <span class="per-tray">11/tray</span></label>
          <div class="tc-row">
            <div class="tc-group"><label>Trays</label><input type="text" id="tcTrays-indi" inputmode="numeric" placeholder="0"></div>
            <div class="tc-group"><label>Singles</label><input type="text" id="tcExtra-indi" inputmode="numeric" placeholder="0"></div>
          </div>
          <div class="tc-total" id="tcTotal-indi">= <span>0 balls</span></div>
        </div>
        <div class="input-group">
          <label>Small <span class="per-tray">8/tray</span></label>
          <div class="tc-row">
            <div class="tc-group"><label>Trays</label><input type="text" id="tcTrays-small" inputmode="numeric" placeholder="0"></div>
            <div class="tc-group"><label>Singles</label><input type="text" id="tcExtra-small" inputmode="numeric" placeholder="0"></div>
          </div>
          <div class="tc-total" id="tcTotal-small">= <span>0 balls</span></div>
        </div>
        <div class="input-group">
          <label>Large <span class="per-tray">6/tray</span></label>
          <div class="tc-row">
            <div class="tc-group"><label>Trays</label><input type="text" id="tcTrays-large" inputmode="numeric" placeholder="0"></div>
            <div class="tc-group"><label>Singles</label><input type="text" id="tcExtra-large" inputmode="numeric" placeholder="0"></div>
          </div>
          <div class="tc-total" id="tcTotal-large">= <span>0 balls</span></div>
        </div>
        <div class="input-group">
          <label>Sicilian</label>
          <div class="tc-row">
            <div class="tc-group"><label>Balls</label><input type="text" id="countSic" inputmode="numeric" placeholder="0"></div>
          </div>
        </div>
        <div class="input-group boil-input-full">
          <label>Boil Dough <span class="per-tray">Target: 36 balls | 6/tray</span></label>
          <div class="tc-row">
            <div class="tc-group"><label>Trays</label><input type="text" id="tcTrays-boil" inputmode="numeric" placeholder="0"></div>
            <div class="tc-group"><label>Singles</label><input type="text" id="tcExtra-boil" inputmode="numeric" placeholder="0"></div>
          </div>
          <div class="tc-total" id="tcTotal-boil">= <span>0 balls</span></div>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="results"></div>

    <!-- Save Button -->
    <button type="button" class="save-btn" id="saveBtn">Save Today's Count</button>

    <!-- Temperature Tracking -->
    <div class="temp-section">
      <div class="temp-title">Batch Temperatures</div>
      <div class="temp-date-row">
        <div class="input-group">
          <label>Date</label>
          <input type="text" id="tempDate" inputmode="text" placeholder="MM/DD/YYYY">
        </div>
        <button type="button" class="temp-load-btn" id="tempLoadBtn">Load</button>
      </div>
      <div id="tempStatus"></div>
      <div id="tempOverrideArea"></div>
      <div id="tempInputs"></div>
      <button type="button" class="temp-save-btn" id="tempSaveBtn" style="display:none">Save Temperatures</button>
    </div>

    <!-- History -->
    <div class="history-section">
      <div class="card-label">Recent History</div>
      <div id="historyList"></div>
    </div>
  </main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysGE_0ynpVxJNdmvsfPjAdkQA3Lng7YMDp1OjP-EXbdx3xqEixgjwCKxVeSisECo-j/exec';
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1MVjVlKd3pwXB_JkHZkP00FnM0fBerfwStfqJ-GBza0M/edit?gid=0#gid=0';

    const DOUGH_TABLE = [
      { threshold: 3750,  indi: 11, small: 52,  large: 44,  sic: 2 },
      { threshold: 4000,  indi: 12, small: 58,  large: 50,  sic: 2 },
      { threshold: 4400,  indi: 13, small: 63,  large: 56,  sic: 2 },
      { threshold: 4800,  indi: 14, small: 69,  large: 62,  sic: 2 },
      { threshold: 5200,  indi: 15, small: 74,  large: 65,  sic: 2 },
      { threshold: 5700,  indi: 17, small: 81,  large: 72,  sic: 2 },
      { threshold: 6300,  indi: 18, small: 88,  large: 79,  sic: 2 },
      { threshold: 6800,  indi: 20, small: 94,  large: 87,  sic: 3 },
      { threshold: 7200,  indi: 21, small: 101, large: 94,  sic: 3 },
      { threshold: 7800,  indi: 22, small: 108, large: 99,  sic: 3 },
      { threshold: 8300,  indi: 24, small: 115, large: 106, sic: 3 },
      { threshold: 9100,  indi: 26, small: 125, large: 117, sic: 3 },
      { threshold: 10000, indi: 28, small: 136, large: 126, sic: 4 },
      { threshold: 10700, indi: 30, small: 146, large: 137, sic: 4 },
      { threshold: 11500, indi: 32, small: 156, large: 148, sic: 4 },
      { threshold: 12250, indi: 34, small: 166, large: 159, sic: 4 },
      { threshold: 13000, indi: 37, small: 177, large: 166, sic: 5 },
      { threshold: 13900, indi: 39, small: 187, large: 177, sic: 5 },
      { threshold: 14750, indi: 41, small: 197, large: 188, sic: 5 },
      { threshold: 15500, indi: 43, small: 206, large: 195, sic: 5 },
      { threshold: 16250, indi: 44, small: 214, large: 205, sic: 6 },
      { threshold: 17000, indi: 44, small: 225, large: 216, sic: 6 },
      { threshold: 17750, indi: 44, small: 235, large: 225, sic: 6 },
      { threshold: 18500, indi: 44, small: 246, large: 237, sic: 6 },
      { threshold: 19250, indi: 44, small: 255, large: 247, sic: 6 },
      { threshold: 20000, indi: 44, small: 266, large: 256, sic: 7 },
      { threshold: 20750, indi: 44, small: 276, large: 267, sic: 7 },
    ];

    const PER_TRAY = { indi: 11, small: 8, large: 6, sic: 3 };
    const TRAYS_PER_BATCH = 11;
    const TYPES = ['indi', 'small', 'large', 'sic'];
    const TYPE_LABELS = { indi: 'Individual', small: 'Small', large: 'Large', sic: 'Sicilian' };
    const TYPE_COLORS = { indi: '#FF9800', small: '#2196F3', large: '#9C27B0', sic: '#4CAF50' };
    const TYPE_SHORT = { indi: 'Indi', small: 'Sm', large: 'Lg', sic: 'Sic' };

    function parseDollar(str) {
      return parseFloat(String(str).replace(/[$,\s]/g, '')) || 0;
    }

    function expandDollar(raw) {
      var n = parseDollar(raw);
      if (n === 0) return 0;
      if (n < 100) return Math.round(n * 1000);
      return n;
    }

    function updateHint(inputId, hintId) {
      var raw = document.getElementById(inputId).value.trim();
      var hint = document.getElementById(hintId);
      if (!raw) { hint.innerHTML = ''; return; }
      var val = expandDollar(raw);
      hint.innerHTML = '= <span>' + formatDollar(val) + '</span>';
    }

    function lookup(dollarAmount) {
      // Find smallest threshold >= dollarAmount; cap at highest row
      for (const entry of DOUGH_TABLE) {
        if (entry.threshold >= dollarAmount) return entry;
      }
      return DOUGH_TABLE[DOUGH_TABLE.length - 1];
    }

    function formatDollar(n) {
      return '$' + n.toLocaleString('en-US');
    }

    function valClass(n) {
      if (n < 0) return 'negative';
      if (n > 0) return 'positive';
      return '';
    }

    function getCount(type) {
      if (type === 'sic') {
        return parseInt(document.getElementById('countSic').value) || 0;
      }
      var fullTrays = parseInt(document.getElementById('tcTrays-' + type).value) || 0;
      var extra = parseInt(document.getElementById('tcExtra-' + type).value) || 0;
      var total = (fullTrays * PER_TRAY[type]) + extra;
      document.getElementById('tcTotal-' + type).innerHTML = '= <span>' + total + ' balls</span>';
      return total;
    }

    const BOIL_TARGET = 36;
    const BOIL_PER_TRAY = 6;

    function getBoilCount() {
      var fullTrays = parseInt(document.getElementById('tcTrays-boil').value) || 0;
      var extra = parseInt(document.getElementById('tcExtra-boil').value) || 0;
      var total = (fullTrays * BOIL_PER_TRAY) + extra;
      document.getElementById('tcTotal-boil').innerHTML = '= <span>' + total + ' balls</span>';
      return total;
    }

    function calculate() {
      // Update dollar hints
      updateHint('currentSales', 'hintCurrentSales');
      updateHint('todayForecast', 'hintTodayForecast');
      updateHint('tomorrowForecast', 'hintTomorrowForecast');

      const currentSales = expandDollar(document.getElementById('currentSales').value);
      const todayForecast = expandDollar(document.getElementById('todayForecast').value);
      const tomorrowForecast = expandDollar(document.getElementById('tomorrowForecast').value);
      const counts = {
        indi: getCount('indi'),
        small: getCount('small'),
        large: getCount('large'),
        sic: getCount('sic'),
      };

      const salesLeft = todayForecast - currentSales;
      const doughUse = lookup(salesLeft);
      const doughLeft = {};
      const tomorrowNeed = lookup(tomorrowForecast);
      const ballsToMake = {};
      const trays = {};

      for (const t of TYPES) {
        doughLeft[t] = counts[t] - doughUse[t];
        ballsToMake[t] = tomorrowNeed[t] - doughLeft[t];
        if (t === 'sic' && ballsToMake[t] < 2) ballsToMake[t] = 2;
        trays[t] = ballsToMake[t] <= 0 ? 0 : Math.ceil(ballsToMake[t] / PER_TRAY[t]);
      }

      // Boil Dough — fixed target, not from lookup
      const boilCount = getBoilCount();
      const boilMake = Math.max(0, BOIL_TARGET - boilCount);
      const boilTrays = boilMake === 0 ? 0 : Math.ceil(boilMake / BOIL_PER_TRAY);

      const totalTrays = TYPES.reduce((sum, t) => sum + trays[t], 0) + boilTrays;
      const batches = totalTrays === 0 ? 0 : Math.ceil(totalTrays / TRAYS_PER_BATCH);

      // Sales Left banner
      document.getElementById('salesLeftValue').textContent = formatDollar(salesLeft);

      // Size cards — always visible
      const resultsEl = document.getElementById('results');
      let html = '<div class="results-grid">';
      for (const t of TYPES) {
        const color = TYPE_COLORS[t];
        const leftVal = doughLeft[t];
        html += '<div class="size-card">';
        html += '<div class="accent-bar" style="background:' + color + '"></div>';
        html += '<div class="sc-body">';
        html += '<div class="sc-name" style="color:' + color + '">' + TYPE_LABELS[t] + '</div>';
        html += '<div class="stats-row">';
        html += '<div class="stat"><div class="stat-label">Tonight</div><div class="stat-value">' + doughUse[t] + '</div></div>';
        html += '<div class="stat"><div class="stat-label">Left</div><div class="stat-value ' + valClass(leftVal) + '">' + leftVal + '</div></div>';
        html += '<div class="stat"><div class="stat-label">Need</div><div class="stat-value">' + tomorrowNeed[t] + '</div></div>';
        html += '</div>';
        html += '<div class="make-row">';
        html += '<div class="make-label">Make <strong>' + ballsToMake[t] + '</strong> balls</div>';
        if (t !== 'sic') {
          html += '<div class="tray-badge" style="background:' + color + '">' + trays[t] + '</div>';
        }
        html += '</div>';
        html += '</div></div>';
      }
      html += '</div>';

      // Boil Dough card — full width
      var boilTraysDisplay = Math.floor(boilMake / BOIL_PER_TRAY);
      var boilSingles = boilMake % BOIL_PER_TRAY;
      html += '<div class="boil-card">';
      html += '<div class="accent-bar"></div>';
      html += '<div class="sc-body">';
      html += '<div class="sc-name">Boil Dough</div>';
      html += '<div class="boil-stats">';
      html += '<div class="boil-stat"><div class="stat-label">Have</div><div class="stat-value">' + boilCount + '</div></div>';
      html += '<div class="boil-stat"><div class="stat-label">Target</div><div class="stat-value">' + BOIL_TARGET + '</div></div>';
      html += '<div class="boil-stat"><div class="stat-label">Make</div><div class="stat-value">' + boilMake + '</div></div>';
      html += '</div>';
      if (boilMake > 0) {
        html += '<div class="boil-make">Make ' + boilTraysDisplay + ' trays and ' + boilSingles + ' singles</div>';
      } else {
        html += '<div class="boil-make stocked">Fully stocked!</div>';
      }
      html += '</div></div>';

      // Batch hero card
      const batchClass = batches > 0 ? 'has-batches' : 'zero-batches';
      html += '<div class="batch-card ' + batchClass + '">';
      html += '<div class="batch-label">Batches</div>';
      html += '<div class="batch-number">' + batches + '</div>';
      html += '<div class="batch-sub">' + totalTrays + ' trays total</div>';
      html += '<div class="tray-breakdown">';
      for (const t of ['indi', 'small', 'large']) {
        html += '<div class="tb-item"><div class="tb-count">' + trays[t] + '</div><div class="tb-label">' + TYPE_SHORT[t] + '</div></div>';
      }
      html += '<div class="tb-item"><div class="tb-count">' + ballsToMake.sic + '</div><div class="tb-label">Sic balls</div></div>';
      html += '<div class="tb-item"><div class="tb-count">' + boilTrays + '</div><div class="tb-label">Boil</div></div>';
      html += '</div>';
      html += '</div>';

      resultsEl.innerHTML = html;
    }

    // Live calculation on every input change
    document.querySelectorAll('input[type="text"]').forEach(function(input) {
      input.addEventListener('input', calculate);
    });

    // Run once on load so results are always visible
    calculate();

    // ── Save Entry ──
    var saveBtn = document.getElementById('saveBtn');
    saveBtn.addEventListener('click', function() {
      if (saveBtn.disabled) return;
      var now = new Date();
      var date = (now.getMonth()+1) + '/' + now.getDate() + '/' + now.getFullYear();
      var data = {
        date: date,
        todayForecast: expandDollar(document.getElementById('todayForecast').value),
        currentSales: expandDollar(document.getElementById('currentSales').value),
        salesLeft: expandDollar(document.getElementById('todayForecast').value) - expandDollar(document.getElementById('currentSales').value),
        tomorrowForecast: expandDollar(document.getElementById('tomorrowForecast').value),
        indiCount: getCount('indi'),
        smallCount: getCount('small'),
        largeCount: getCount('large'),
        sicCount: getCount('sic'),
        boilCount: getBoilCount(),
        batches: parseInt(document.querySelector('.batch-number') ? document.querySelector('.batch-number').textContent : '0') || 0
      };
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
      saveBtn.classList.remove('error', 'success');
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      }).then(function() {
        saveBtn.textContent = 'Saved!';
        saveBtn.classList.add('success');
        setTimeout(function() {
          saveBtn.textContent = 'Save Today\'s Count';
          saveBtn.disabled = false;
          saveBtn.classList.remove('success');
          loadHistory();
        }, 3000);
      }).catch(function() {
        saveBtn.textContent = 'Error \u2014 tap to retry';
        saveBtn.classList.add('error');
        saveBtn.disabled = false;
      });
    });

    // ── History ──
    function loadHistory() {
      var list = document.getElementById('historyList');
      fetch(SCRIPT_URL)
        .then(function(r) { return r.json(); })
        .then(function(rows) {
          if (!rows || !rows.length) {
            list.innerHTML = '<a class="history-link" href="' + SHEET_URL + '" target="_blank">View Full History</a>';
            return;
          }
          var recent = rows.slice(-10).reverse();
          var html = '';
          for (var i = 0; i < recent.length; i++) {
            var r = recent[i];
            var date = r['Date'] || r['date'] || '';
            if (date && date.indexOf('T') > -1) date = new Date(date).toLocaleDateString('en-US');
            var forecast = r["Today's Forecast"] || r['todayForecast'] || 0;
            var sales = r['Current Sales'] || r['currentSales'] || 0;
            var batches = r['Batches'] || r['batches'] || 0;
            html += '<div class="history-card">';
            html += '<div><div class="hc-date">' + date + '</div>';
            html += '<div class="hc-details">Forecast: $' + Number(forecast).toLocaleString() + ' &middot; Sales: $' + Number(sales).toLocaleString() + '</div></div>';
            html += '<div class="hc-batches">' + batches + '</div>';
            html += '</div>';
          }
          html += '<a class="history-link" href="' + SHEET_URL + '" target="_blank">View Full History</a>';
          list.innerHTML = html;
        })
        .catch(function() {
          list.innerHTML = '<a class="history-link" href="' + SHEET_URL + '" target="_blank">View Full History</a>';
        });
    }
    loadHistory();

    // ── Temperature Tracking ──
    var tempBatchCount = 0;

    function getTodayDate() {
      var now = new Date();
      return (now.getMonth()+1) + '/' + now.getDate() + '/' + now.getFullYear();
    }

    function normalizeDate(str) {
      var parts = str.split('/');
      if (parts.length !== 3) return str;
      return parseInt(parts[0]) + '/' + parseInt(parts[1]) + '/' + parts[2];
    }

    // Default date to today
    document.getElementById('tempDate').value = getTodayDate();

    function renderTempInputs(n) {
      n = Math.min(Math.max(0, n), 10);
      tempBatchCount = n;
      var container = document.getElementById('tempInputs');
      var saveBtn = document.getElementById('tempSaveBtn');
      if (n === 0) {
        container.innerHTML = '';
        saveBtn.style.display = 'none';
        return;
      }
      var html = '';
      for (var i = 1; i <= n; i++) {
        html += '<div class="temp-batch-pair">';
        html += '<div class="tb-label">Batch ' + i + '</div>';
        html += '<div class="tb-inputs">';
        html += '<div><label>Water \u00B0F</label><input type="text" id="tempWater-' + i + '" inputmode="decimal" placeholder="0"></div>';
        html += '<div><label>Dough \u00B0F</label><input type="text" id="tempDough-' + i + '" inputmode="decimal" placeholder="0"></div>';
        html += '</div></div>';
      }
      container.innerHTML = html;
      saveBtn.style.display = 'block';
    }

    function showTempOverride() {
      var area = document.getElementById('tempOverrideArea');
      area.innerHTML = '<div class="temp-manual-row">' +
        '<div class="input-group"><label>Number of batches</label>' +
        '<input type="text" id="tempManualCount" inputmode="numeric" placeholder="1-10"></div>' +
        '<button type="button" class="temp-load-btn" id="tempManualGo">Set</button></div>';
      document.getElementById('tempManualGo').addEventListener('click', function() {
        var n = parseInt(document.getElementById('tempManualCount').value) || 0;
        if (n < 1 || n > 10) {
          document.getElementById('tempStatus').innerHTML = '<div class="temp-message error">Enter a number between 1 and 10</div>';
          return;
        }
        document.getElementById('tempStatus').innerHTML = '<div class="temp-message">' + n + ' batch' + (n > 1 ? 'es' : '') + ' — enter temps below</div>';
        area.innerHTML = '';
        renderTempInputs(n);
      });
    }

    // Load button — fetch batch count for a date
    document.getElementById('tempLoadBtn').addEventListener('click', function() {
      var rawDate = document.getElementById('tempDate').value.trim();
      if (!rawDate) return;
      var date = normalizeDate(rawDate);
      document.getElementById('tempDate').value = date;
      var status = document.getElementById('tempStatus');
      var override = document.getElementById('tempOverrideArea');
      var loadBtn = document.getElementById('tempLoadBtn');
      status.innerHTML = '<div class="temp-message">Loading...</div>';
      override.innerHTML = '';
      loadBtn.disabled = true;
      loadBtn.textContent = '...';
      renderTempInputs(0);

      var url = SCRIPT_URL + '?date=' + encodeURIComponent(date);
      console.log('[Temp Load] GET ' + url);

      fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          console.log('[Temp Load] Response:', data);
          loadBtn.disabled = false;
          loadBtn.textContent = 'Load';
          var batches = 0;
          if (data && typeof data === 'object' && !Array.isArray(data)) {
            if (data.status === 'found' && data.data) {
              batches = parseInt(data.data['Batches'] || data.data['batches']) || 0;
            } else {
              batches = parseInt(data['Batches'] || data['batches']) || 0;
            }
          } else if (Array.isArray(data)) {
            for (var i = 0; i < data.length; i++) {
              var rd = data[i]['Date'] || data[i]['date'] || '';
              if (rd && rd.indexOf('T') > -1) rd = new Date(rd).toLocaleDateString('en-US');
              var rdNorm = normalizeDate(rd);
              if (rdNorm === date) {
                batches = parseInt(data[i]['Batches'] || data[i]['batches']) || 0;
              }
            }
          }
          if (batches > 0) {
            batches = Math.min(batches, 10);
            status.innerHTML = '<div class="temp-message">' + batches + ' batch' + (batches > 1 ? 'es' : '') + ' found for ' + date + '</div>';
            override.innerHTML = '<button type="button" class="temp-override" id="tempOverrideBtn">Change batch count</button>';
            document.getElementById('tempOverrideBtn').addEventListener('click', showTempOverride);
            renderTempInputs(batches);
          } else {
            status.innerHTML = '<div class="temp-message error">No dough count saved for this date \u2014 count dough first</div>';
            override.innerHTML = '<button type="button" class="temp-override" id="tempOverrideBtn">Enter batch count manually</button>';
            document.getElementById('tempOverrideBtn').addEventListener('click', showTempOverride);
          }
        })
        .catch(function(err) {
          console.log('[Temp Load] Error:', err);
          loadBtn.disabled = false;
          loadBtn.textContent = 'Load';
          status.innerHTML = '<div class="temp-message error">Could not load data \u2014 enter batch count manually</div>';
          showTempOverride();
        });
    });

    // Auto-sync: when calculate() runs and batch count changes, update temp inputs if date is today
    var lastAutoBatches = 0;
    var originalCalculate = calculate;
    calculate = function() {
      originalCalculate();
      var batchEl = document.querySelector('.batch-number');
      var currentBatches = batchEl ? parseInt(batchEl.textContent) || 0 : 0;
      currentBatches = Math.min(currentBatches, 10);
      var dateField = document.getElementById('tempDate');
      if (dateField.value.trim() === getTodayDate() && currentBatches !== lastAutoBatches) {
        lastAutoBatches = currentBatches;
        var status = document.getElementById('tempStatus');
        var override = document.getElementById('tempOverrideArea');
        if (currentBatches > 0) {
          status.innerHTML = '<div class="temp-message">' + currentBatches + ' batch' + (currentBatches > 1 ? 'es' : '') + ' from current count</div>';
          override.innerHTML = '<button type="button" class="temp-override" id="tempOverrideBtn">Change batch count</button>';
          document.getElementById('tempOverrideBtn').addEventListener('click', showTempOverride);
          renderTempInputs(currentBatches);
        } else {
          status.innerHTML = '';
          override.innerHTML = '';
          renderTempInputs(0);
        }
      }
    };

    // Save Temps
    document.getElementById('tempSaveBtn').addEventListener('click', function() {
      var btn = document.getElementById('tempSaveBtn');
      if (btn.disabled) return;
      var date = normalizeDate(document.getElementById('tempDate').value.trim());
      var temps = [];
      for (var i = 1; i <= tempBatchCount; i++) {
        var wEl = document.getElementById('tempWater-' + i);
        var dEl = document.getElementById('tempDough-' + i);
        temps.push({
          water: parseFloat(wEl ? wEl.value : '') || 0,
          dough: parseFloat(dEl ? dEl.value : '') || 0
        });
      }
      var data = {
        type: 'temps',
        date: date,
        temps: temps
      };
      btn.disabled = true;
      btn.textContent = 'Saving...';
      btn.classList.remove('error', 'success');
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      }).then(function() {
        btn.textContent = 'Saved!';
        btn.classList.add('success');
        setTimeout(function() {
          btn.textContent = 'Save Temperatures';
          btn.disabled = false;
          btn.classList.remove('success');
        }, 3000);
      }).catch(function() {
        btn.textContent = 'Error \u2014 tap to retry';
        btn.classList.add('error');
        btn.disabled = false;
      });
    });

    // ── Reset ──
    document.getElementById('resetBtn').addEventListener('click', function() {
      document.querySelectorAll('input[type="text"]').forEach(function(input) { input.value = ''; });
      // Reset temp section
      document.getElementById('tempDate').value = getTodayDate();
      document.getElementById('tempStatus').innerHTML = '';
      document.getElementById('tempOverrideArea').innerHTML = '';
      renderTempInputs(0);
      lastAutoBatches = 0;
      calculate();
    });
  </script>
</body>
</html>
