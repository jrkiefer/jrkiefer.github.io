<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dough Tracker — Dough Bible 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Mono', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      font-size: 14px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 420px;
      margin: 0 auto;
      padding: 0 12px 120px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 50%, #e53935 100%);
      padding: 1.25rem 1rem;
      text-align: center;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 2px;
    }
    .header .subtitle {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Cards ── */
    .card {
      background: #141414;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
    }

    /* ── Inputs ── */
    .input-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .input-group { margin-bottom: 10px; }
    .input-group:last-child { margin-bottom: 0; }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      color: #999;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .input-group .per-tray {
      font-size: 0.6rem;
      color: #555;
      font-weight: 400;
    }
    .dollar-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .dollar-wrap .prefix {
      position: absolute;
      left: 12px;
      color: #555;
      font-size: 1rem;
      font-weight: 700;
      pointer-events: none;
      z-index: 1;
    }
    .dollar-wrap input {
      padding-left: 28px;
    }
    input[type="text"] {
      width: 100%;
      height: 48px;
      padding: 0 12px;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]::placeholder {
      color: #444;
      font-weight: 400;
    }
    input[type="text"]:focus {
      border-color: #d32f2f;
      box-shadow: 0 0 0 3px rgba(211,47,47,0.2);
    }

    /* ── Sales Left Banner ── */
    .sales-left {
      background: rgba(33,150,243,0.1);
      border: 1px solid rgba(33,150,243,0.25);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      margin-top: 12px;
    }
    .sales-left .sl-label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #64B5F6;
      margin-bottom: 2px;
    }
    .sales-left .sl-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #90CAF9;
    }

    /* ── Results Grid ── */
    #results { display: none; }
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .size-card {
      background: #141414;
      border-radius: 12px;
      overflow: hidden;
    }
    .size-card .accent-bar {
      height: 3px;
    }
    .size-card .sc-body {
      padding: 12px;
    }
    .size-card .sc-name {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .size-card .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      margin-bottom: 10px;
    }
    .size-card .stat {
      text-align: center;
    }
    .size-card .stat .stat-label {
      font-size: 0.55rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .size-card .stat .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: #ccc;
    }
    .stat-value.positive { color: #4CAF50; }
    .stat-value.negative { color: #ef5350; }

    .size-card .make-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid #222;
    }
    .size-card .make-label {
      font-size: 0.65rem;
      color: #888;
    }
    .size-card .make-label strong {
      color: #ccc;
      font-size: 0.85rem;
    }
    .size-card .tray-badge {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    /* ── Batch Hero ── */
    .batch-card {
      border-radius: 16px;
      padding: 24px 16px 20px;
      text-align: center;
      overflow: hidden;
    }
    .batch-card.has-batches {
      background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 50%, #e53935 100%);
    }
    .batch-card.zero-batches {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #43a047 100%);
    }
    .batch-card .batch-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 4px;
    }
    .batch-card .batch-number {
      font-size: 80px;
      font-weight: 700;
      line-height: 1;
      color: #fff;
      margin-bottom: 4px;
    }
    .batch-card .batch-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 16px;
    }
    .batch-card .tray-breakdown {
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .batch-card .tb-item {
      text-align: center;
    }
    .batch-card .tb-item .tb-count {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }
    .batch-card .tb-item .tb-label {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dough Tracker</h1>
    <div class="subtitle">Dough Bible 2026</div>
  </div>

  <main>
    <!-- Sales & Forecast -->
    <div class="card">
      <div class="card-label">Sales &amp; Forecast</div>
      <div class="input-grid-2">
        <div class="input-group">
          <label for="currentSales">Current Sales</label>
          <div class="dollar-wrap">
            <span class="prefix">$</span>
            <input type="text" id="currentSales" inputmode="decimal" placeholder="1,700">
          </div>
        </div>
        <div class="input-group">
          <label for="todayForecast">Today's Forecast</label>
          <div class="dollar-wrap">
            <span class="prefix">$</span>
            <input type="text" id="todayForecast" inputmode="decimal" placeholder="10,000">
          </div>
        </div>
      </div>
      <div class="input-group">
        <label for="tomorrowForecast">Tomorrow's Forecast</label>
        <div class="dollar-wrap">
          <span class="prefix">$</span>
          <input type="text" id="tomorrowForecast" inputmode="decimal" placeholder="10,000">
        </div>
      </div>
      <div class="sales-left" id="salesLeftBanner" style="display:none">
        <div class="sl-label">Sales Left</div>
        <div class="sl-value" id="salesLeftValue">$0</div>
      </div>
    </div>

    <!-- Dough Counts -->
    <div class="card">
      <div class="card-label">Current Dough Counts</div>
      <div class="input-grid-2">
        <div class="input-group">
          <label for="countIndi">Individual <span class="per-tray">11/tray</span></label>
          <input type="text" id="countIndi" inputmode="numeric" placeholder="0">
        </div>
        <div class="input-group">
          <label for="countSmall">Small <span class="per-tray">8/tray</span></label>
          <input type="text" id="countSmall" inputmode="numeric" placeholder="0">
        </div>
        <div class="input-group">
          <label for="countLarge">Large <span class="per-tray">6/tray</span></label>
          <input type="text" id="countLarge" inputmode="numeric" placeholder="0">
        </div>
        <div class="input-group">
          <label for="countSic">Sicilian <span class="per-tray">3/tray</span></label>
          <input type="text" id="countSic" inputmode="numeric" placeholder="0">
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="results"></div>
  </main>

  <script>
    const DOUGH_TABLE = [
      { threshold: 3750,  indi: 11, small: 52,  large: 44,  sic: 2 },
      { threshold: 4000,  indi: 12, small: 58,  large: 50,  sic: 2 },
      { threshold: 4400,  indi: 13, small: 63,  large: 56,  sic: 2 },
      { threshold: 4800,  indi: 14, small: 69,  large: 62,  sic: 2 },
      { threshold: 5200,  indi: 15, small: 74,  large: 65,  sic: 2 },
      { threshold: 5700,  indi: 17, small: 81,  large: 72,  sic: 2 },
      { threshold: 6300,  indi: 18, small: 88,  large: 79,  sic: 2 },
      { threshold: 6800,  indi: 20, small: 94,  large: 87,  sic: 3 },
      { threshold: 7200,  indi: 21, small: 101, large: 94,  sic: 3 },
      { threshold: 7800,  indi: 22, small: 108, large: 99,  sic: 3 },
      { threshold: 8300,  indi: 24, small: 115, large: 106, sic: 3 },
      { threshold: 9100,  indi: 26, small: 125, large: 117, sic: 3 },
      { threshold: 10000, indi: 28, small: 136, large: 126, sic: 4 },
      { threshold: 10700, indi: 30, small: 146, large: 137, sic: 4 },
      { threshold: 11500, indi: 32, small: 156, large: 148, sic: 4 },
      { threshold: 12250, indi: 34, small: 166, large: 159, sic: 4 },
      { threshold: 13000, indi: 37, small: 177, large: 166, sic: 5 },
      { threshold: 13900, indi: 39, small: 187, large: 177, sic: 5 },
      { threshold: 14750, indi: 41, small: 197, large: 188, sic: 5 },
      { threshold: 15500, indi: 43, small: 206, large: 195, sic: 5 },
      { threshold: 16250, indi: 44, small: 214, large: 205, sic: 6 },
      { threshold: 17000, indi: 44, small: 225, large: 216, sic: 6 },
      { threshold: 17750, indi: 44, small: 235, large: 225, sic: 6 },
      { threshold: 18500, indi: 44, small: 246, large: 237, sic: 6 },
      { threshold: 19250, indi: 44, small: 255, large: 247, sic: 6 },
      { threshold: 20000, indi: 44, small: 266, large: 256, sic: 7 },
      { threshold: 20750, indi: 44, small: 276, large: 267, sic: 7 },
    ];

    const PER_TRAY = { indi: 11, small: 8, large: 6, sic: 3 };
    const TRAYS_PER_BATCH = 11;
    const TYPES = ['indi', 'small', 'large', 'sic'];
    const TYPE_LABELS = { indi: 'Individual', small: 'Small', large: 'Large', sic: 'Sicilian' };
    const TYPE_COLORS = { indi: '#FF9800', small: '#2196F3', large: '#9C27B0', sic: '#4CAF50' };
    const TYPE_SHORT = { indi: 'Indi', small: 'Sm', large: 'Lg', sic: 'Sic' };

    function parseDollar(str) {
      return parseFloat(String(str).replace(/[$,\s]/g, '')) || 0;
    }

    function lookup(dollarAmount) {
      let closest = DOUGH_TABLE[0];
      let minDiff = Math.abs(dollarAmount - closest.threshold);
      for (const entry of DOUGH_TABLE) {
        const diff = Math.abs(dollarAmount - entry.threshold);
        if (diff < minDiff || (diff === minDiff && entry.threshold > closest.threshold)) {
          closest = entry;
          minDiff = diff;
        }
      }
      return closest;
    }

    function formatDollar(n) {
      return '$' + n.toLocaleString('en-US');
    }

    function hasInput() {
      const ids = ['currentSales', 'todayForecast', 'tomorrowForecast', 'countIndi', 'countSmall', 'countLarge', 'countSic'];
      return ids.some(id => document.getElementById(id).value.trim() !== '');
    }

    function calculate() {
      const currentSales = parseDollar(document.getElementById('currentSales').value);
      const todayForecast = parseDollar(document.getElementById('todayForecast').value);
      const tomorrowForecast = parseDollar(document.getElementById('tomorrowForecast').value);
      const counts = {
        indi: parseInt(document.getElementById('countIndi').value) || 0,
        small: parseInt(document.getElementById('countSmall').value) || 0,
        large: parseInt(document.getElementById('countLarge').value) || 0,
        sic: parseInt(document.getElementById('countSic').value) || 0,
      };

      const salesLeft = todayForecast - currentSales;
      const doughUse = lookup(salesLeft);
      const doughLeft = {};
      const tomorrowNeed = lookup(tomorrowForecast);
      const ballsToMake = {};
      const trays = {};

      for (const t of TYPES) {
        doughLeft[t] = counts[t] - doughUse[t];
        ballsToMake[t] = tomorrowNeed[t] - doughLeft[t];
        trays[t] = ballsToMake[t] <= 0 ? 0 : Math.ceil(ballsToMake[t] / PER_TRAY[t]);
      }

      const totalTrays = TYPES.reduce((sum, t) => sum + trays[t], 0);
      const batches = totalTrays === 0 ? 0 : Math.ceil(totalTrays / TRAYS_PER_BATCH);

      // Sales Left banner
      const slBanner = document.getElementById('salesLeftBanner');
      const slValue = document.getElementById('salesLeftValue');
      if (todayForecast > 0 || currentSales > 0) {
        slBanner.style.display = 'block';
        slValue.textContent = formatDollar(salesLeft);
      } else {
        slBanner.style.display = 'none';
      }

      // Show results only if user has entered something
      const resultsEl = document.getElementById('results');
      if (!hasInput()) {
        resultsEl.style.display = 'none';
        return;
      }
      resultsEl.style.display = 'block';

      // Size cards
      let html = '<div class="results-grid">';
      for (const t of TYPES) {
        const color = TYPE_COLORS[t];
        const leftVal = doughLeft[t];
        const leftClass = leftVal < 0 ? 'negative' : leftVal > 0 ? 'positive' : '';
        html += '<div class="size-card">';
        html += '<div class="accent-bar" style="background:' + color + '"></div>';
        html += '<div class="sc-body">';
        html += '<div class="sc-name" style="color:' + color + '">' + TYPE_LABELS[t] + '</div>';
        html += '<div class="stats-row">';
        html += '<div class="stat"><div class="stat-label">Tonight</div><div class="stat-value">' + doughUse[t] + '</div></div>';
        html += '<div class="stat"><div class="stat-label">Left</div><div class="stat-value ' + leftClass + '">' + leftVal + '</div></div>';
        html += '<div class="stat"><div class="stat-label">Need</div><div class="stat-value">' + tomorrowNeed[t] + '</div></div>';
        html += '</div>';
        html += '<div class="make-row">';
        html += '<div class="make-label">Make <strong>' + ballsToMake[t] + '</strong> balls</div>';
        html += '<div class="tray-badge" style="background:' + color + '">' + trays[t] + '</div>';
        html += '</div>';
        html += '</div></div>';
      }
      html += '</div>';

      // Batch hero card
      const batchClass = batches > 0 ? 'has-batches' : 'zero-batches';
      html += '<div class="batch-card ' + batchClass + '">';
      html += '<div class="batch-label">Batches</div>';
      html += '<div class="batch-number">' + batches + '</div>';
      html += '<div class="batch-sub">' + totalTrays + ' trays total</div>';
      html += '<div class="tray-breakdown">';
      for (const t of TYPES) {
        html += '<div class="tb-item"><div class="tb-count">' + trays[t] + '</div><div class="tb-label">' + TYPE_SHORT[t] + '</div></div>';
      }
      html += '</div>';
      html += '</div>';

      resultsEl.innerHTML = html;
    }

    // Live calculation on every input change
    const allInputs = document.querySelectorAll('input[type="text"]');
    allInputs.forEach(input => input.addEventListener('input', calculate));
  </script>
</body>
</html>
